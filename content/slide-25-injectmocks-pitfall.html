<section class="slide"><h2>The InjectMocks Pitfall</h2><div class="code-grid"><pre><code>public class BaseTest {
    public BaseTest() {
        MockitoAnnotations.openMocks(this);
    }
}</code></pre><pre><code>@ExtendWith(MockitoExtension.class)
class UserTest {

    @Mock
    UserRepo repo;

    @InjectMocks

}</code></pre></div><p class="rule">Use MockitoExtension, not constructors.</p></section>
